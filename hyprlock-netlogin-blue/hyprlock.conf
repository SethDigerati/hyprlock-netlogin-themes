# NetLogin Blue - Hyprlock Theme
# Based on SDDM NetLogin-build
#
# Designed for 1920x1080. Positions are pixel offsets from screen center
# (halign=center, valign=center) unless stated otherwise.

$THEME_DIR = /home/digerati/.local/share/hyprlock/hyprlock-netlogin-blue

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

# ──────────────────────────────────────────────
# BACKGROUND
# ──────────────────────────────────────────────
background {
    path = $THEME_DIR/assets/background.png
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.05
    reload_cmd = $THEME_DIR/scripts/bg-provider.sh
    reload_time = 0
    crossfade_time = 0.5
}

# ──────────────────────────────────────────────
# DATE, TIME & HOSTNAME  —  top center
# ──────────────────────────────────────────────
label {
    text = cmd[update:1000] echo "$(cat /proc/sys/kernel/hostname) | $(date '+%A, %d %B %Y') | $(date '+%H:%M:%S')"
    color = rgba(255, 255, 255, 1.0)
    font_size = 20
    font_family = Sans
    halign = center
    valign = top
    position = 0, 30
}

# ──────────────────────────────────────────────
# CENTRAL PANEL  —  centered, 822x504
# ──────────────────────────────────────────────
image {
    path = $THEME_DIR/assets/central_panel.png
    size = 504
    halign = center
    valign = center
    position = 0, 0
}

# ──────────────────────────────────────────────
# USERNAME LABEL
# ──────────────────────────────────────────────
label {
    text = "Username:"
    color = rgba(255, 255, 255, 1.0)
    font_size = 22
    font_family = Sans
    # bold via pango: <b>Username:</b>
    halign = center
    valign = center
    position = 0, -130
}

# ──────────────────────────────────────────────
# USERNAME ICON  +  CURRENT USER
# ──────────────────────────────────────────────
image {
    path = $THEME_DIR/assets/username_icon.png
    size = 28
    halign = center
    valign = center
    position = -240, -85
}

label {
    text = "$USER"
    color = rgba(48, 151, 255, 1.0)
    font_size = 20
    font_family = Sans
    # bold via pango: <b>Username:</b>
    halign = center
    valign = center
    position = -175, -85
}

# ──────────────────────────────────────────────
# PASSWORD LABEL
# ──────────────────────────────────────────────
label {
    text = "Password:"
    color = rgba(255, 255, 255, 1.0)
    font_size = 22
    font_family = Sans
    # bold via pango: <b>Username:</b>
    halign = center
    valign = center
    position = 0, -40
}

# ──────────────────────────────────────────────
# PASSWORD ICON  +  INPUT FIELD  +  DECORATIVE
# ──────────────────────────────────────────────
image {
    path = $THEME_DIR/assets/password_icon.png
    size = 28
    halign = center
    valign = center
    position = -240, 15
}

input-field {
    size = 400, 75
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(48, 151, 255, 1.0)
    inner_color = rgba(255, 255, 255, 1.0)
    font_color = rgba(0, 0, 0, 1.0)
    font_family = Sans

    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = "<i>Enter password...</i>"
    hide_input = false

    check_color = rgba(0, 200, 0, 1.0)
    fail_color = rgba(255, 0, 0, 1.0)
    fail_text = "Login Failed ($ATTEMPTS)"

    capslock_color = rgba(255, 196, 77, 1.0)

    halign = center
    valign = center
    position = 0, 15
}

image {
    path = $THEME_DIR/assets/arrow_right.png
    size = 28
    halign = center
    valign = center
    position = 240, 15
}

image {
    path = $THEME_DIR/assets/padlock.png
    size = 30
    halign = center
    valign = center
    position = 270, 15
}

image {
    path = $THEME_DIR/assets/warning.png
    size = 24
    halign = center
    valign = center
    position = -190, -40
}

# ──────────────────────────────────────────────
# BACKGROUND CYCLE BUTTON  —  below central panel
# ──────────────────────────────────────────────
label {
    text = "Background"
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = Sans
    halign = center
    valign = center
    position = 0, 278
    onclick = $THEME_DIR/scripts/bg-next.sh
}

# ──────────────────────────────────────────────
# KEYBOARD ICON  —  bottom-left, decorative
# ──────────────────────────────────────────────
label {
    text = "⌨"
    color = rgba(255, 255, 255, 0.5)
    font_size = 24
    font_family = Sans
    halign = left
    valign = bottom
    position = 20, -20
}

# ──────────────────────────────────────────────
# POWER BUTTONS  —  bottom center
# ──────────────────────────────────────────────
label {
    text = "Shutdown"
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = Sans
    halign = center
    valign = bottom
    position = -150, -20
    onclick = systemctl poweroff
}

label {
    text = "Reboot"
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = Sans
    halign = center
    valign = bottom
    position = -50, -20
    onclick = systemctl reboot
}

label {
    text = "Suspend"
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = Sans
    halign = center
    valign = bottom
    position = 50, -20
    onclick = systemctl suspend
}

label {
    text = "Hibernate"
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = Sans
    halign = center
    valign = bottom
    position = 150, -20
    onclick = systemctl hibernate
}
