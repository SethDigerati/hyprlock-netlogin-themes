# NetLogin Red - Hyprlock Theme (minimal)
$THEME_DIR = /home/digerati/.local/share/hyprlock/hyprlock-netlogin-red

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    path = $THEME_DIR/assets/too_close.jpg
    reload_time = 0
    crossfade_time = 0.5
}

label {
    text = cmd[update:1000] echo "$(cat /proc/sys/kernel/hostname) | $(date '+%A, %d %B %Y') | $(date '+%H:%M:%S')"
    color = rgba(255, 255, 255, 1.0)
    font_size = 20
    font_family = Sans
    halign = center
    valign = top
    position = 0, 30
}

label {
    text = $USER
    color = rgba(255, 0, 0, 1.0)
    font_size = 22
    font_family = Sans
    halign = center
    valign = center
    position = 0, -40
}

input-field {
    size = 400, 75
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = 0
    rounding = 0

    outer_color = rgba(255, 0, 0, 1.0)
    inner_color = rgba(255, 255, 255, 1.0)
    font_color = rgba(0, 0, 0, 1.0)
    font_family = Sans

    fade_on_empty = false
    placeholder_text = <i>Enter password...</i>
    hide_input = false

    check_color = rgba(0, 200, 0, 1.0)
    fail_color = rgba(255, 0, 0, 1.0)
    fail_text = $FAIL ($ATTEMPTS)

    capslock_color = rgba(255, 196, 77, 1.0)

    halign = center
    valign = center
    position = 0, 30
}

label {
    text = ⌨
    color = rgba(255, 255, 255, 0.5)
    font_size = 24
    font_family = Sans
    halign = left
    valign = bottom
    position = 20, -20
}

label {
    text = Shutdown
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = Sans
    halign = center
    valign = bottom
    position = -150, -20
    onclick = systemctl poweroff
}

label {
    text = Reboot
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = Sans
    halign = center
    valign = bottom
    position = -50, -20
    onclick = systemctl reboot
}

label {
    text = Suspend
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = Sans
    halign = center
    valign = bottom
    position = 50, -20
    onclick = systemctl suspend
}

label {
    text = Hibernate
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = Sans
    halign = center
    valign = bottom
    position = 150, -20
    onclick = systemctl hibernate
}
